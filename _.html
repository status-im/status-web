ively for secure and confidential communication with friends, family, and business partners, so no one can read or trace your conversations\",\"messengerPseudonymTitle\":\"No identity required to sign up\",\"messengerPseudonymDescription\":\"Sign up with nothing at all. No phone number, email, card, social account, bank account, or personal ID required to create a Status profile. Your profile is an anonymous identity created on your device from the moment you start, and it belongs to you alone, so you are in control of your digital identity from day one\",\"metadataTitle\":\"Keep private who your friends are\",\"metadataDescription\":\"Other apps record what you say while still logging who you talk to and when. Status records nothing. Your contacts, timing, and connections stay invisible to everyone, including the network itself\",\"communitiesTitle\":\"Self-sovereign communities\",\"communitiesDescription\":\"Group chats, forums, and communities built for real people. Create independent, censorship-resistant spaces, set your own rules, and moderate locally, without a corporation deciding what is allowed. Ownership stays in the hands of communities\",\"assetControlTitle\":\"Your keys, your assets\",\"assetControlDescription\":\"Your assets are always under your control. Your keys live on your device, so access never depends on a company staying online or staying friendly\",\"assetOverviewTitle\":\"All your assets, one view\",\"assetOverviewDescription\":\"See everything you hold in a single, always-current view. Assets update in real time, so you never juggle multiple apps just to know where you stand.\",\"digitalCollectionTitle\":\"Your digital collection\",\"digitalCollectionDescription\":\"Keep all of your digital collectibles together in one gallery. View what you own, show it off and carry it with you across every device, all from inside the app.\",\"openSource\":\"Open source\",\"openSourceDescription\":\"Status is fully open source. Every layer, backend, interface, and Logos Messaging protocol, is open to read, audit, and verify how it works\",\"decentralised\":\"No middlemen\",\"decentralisedDescription\":\"No company server sits between you and your contacts. End-to-end encrypted messages move across a peer-to-peer network, and communities are self-hosted by their owners\",\"secure\":\"Secure\",\"secureDescription\":\"Self-controlled keys secure your assets and messages with elliptic curve cryptography\",\"communityDriven\":\"Community driven\",\"communityDrivenDescription\":\"Status is built in the open by its contributors and users. The community helps shape priorities, governance, and its future\",\"permissionless\":\"Self-sovereign\",\"permissionlessDescription\":\"Your identity is fully yours. No central registry, no platform control. Join anonymously and connect with anyone, anywhere\",\"freeAndAdFree\":\"Free and ad-free\",\"freeAndAdFreeDescription\":\"No ads, no tracking. The app stays free and your data stays yours\",\"keycardTitle\":\"Unified Team Workspace\",\"keycardDescription\":\"Ditch the clutter of scattered chats, links, and browser tabs. Status Desktop brings your entire workspace into a single, high-performance local app. Coordinate with your team and access key information without losing focus\"},\"apps\":{\"metaTitle\":\"Apps\",\"metaDescription\":\"Use Status on the go with the mobile app, or get the full set of features on desktop. Private messaging, asset management and a built-in browser, on every device you own.\",\"title\":\"Get Status on every device\",\"description\":\"Use Status on the go with the mobile app, or get the full suite on desktop. Everything stays in sync, so your messages and your assets follow you everywhere.\",\"statusMobile\":\"Status mobile\",\"statusDesktop\":\"Status for desktop\",\"assets\":\"Assets\",\"messenger\":\"Messenger\",\"communities\":\"Communities\",\"createCommunityTitle\":\"Set up your community\",\"createCommunityDescription\":\"Use Status Desktop to lau
